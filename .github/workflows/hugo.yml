name: Redirect GitHub Pages to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect pages
        run: |
          mkdir -p redirect
          cat > redirect/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta name="robots" content="noindex, nofollow">
              <meta http-equiv="refresh" content="0; url=https://ostensible-paradox.pages.dev/">
              <link rel="canonical" href="https://ostensible-paradox.pages.dev/">
              <title>Redirecting...</title>
              <script>
                const target = new URL("https://ostensible-paradox.pages.dev/");
                target.pathname = window.location.pathname;
                target.search = window.location.search;
                target.hash = window.location.hash;
                window.location.replace(target.toString());
              </script>
            </head>
            <body>
              <p><a href="https://ostensible-paradox.pages.dev/">Continue to the site.</a></p>
            </body>
          </html>
          HTML
          cp redirect/index.html redirect/404.html

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect

  deploy:
    environment:
      name: github-pages
      url: https://ostensible-paradox.pages.dev/
    runs-on: ubuntu-latest
    needs: redirect
    steps:
      - name: Deploy redirect to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
